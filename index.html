<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NewGen_Devs Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="title">NewGen_Devs Portfolio</h1>

  <div class="categories">
    <button onclick="setCategory('all')">All</button>
    <button onclick="setCategory('qa')">Quality Assurance</button>
    <button onclick="setCategory('programming')">Programming</button>
    <button onclick="setCategory('management')">Management</button>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search games..." oninput="renderGames()" />
    <select id="sort" onchange="renderGames()">
      <option value="default">Sort By</option>
      <option value="ccu">CCU (High → Low)</option>
      <option value="visits">Visits (High → Low)</option>
      <option value="likes">Likes (High → Low)</option>
      <option value="az">Name (A → Z)</option>
    </select>
    <button id="analytics-btn">📊 View Analytics</button>
  </div>

  <div id="last-update" style="margin-top:5px; font-size:0.9em; color:#555;"></div>

  <div class="carousel-container">
    <button class="arrow left" onclick="scrollLeft()">◀</button>
    <div class="carousel" id="games"></div>
    <button class="arrow right" onclick="scrollRight()">▶</button>
  </div>

<!-- Analytics Modal -->
<div id="dashboard-modal" style="
    display:none; position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.95); z-index:1000; overflow:auto; padding:40px;
    color:white; font-family:Arial,sans-serif;
">
  <button id="close-dashboard" style="
      position:absolute; top:20px; right:10px; font-size:20px; padding:10px 15px; cursor:pointer;
  ">❌ Close</button>

  <h1 style="text-align:center; margin-bottom:40px;">NewGen_Devs Analytics Dashboard</h1>

  <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:40px;">
    <div style="background:#222; padding:20px; border-radius:12px; min-width:300px;">
      <h2>Top Games</h2>
      <canvas id="chart-games" width="300" height="300"></canvas>
    </div>

    <div style="background:#222; padding:20px; border-radius:12px; min-width:300px;">
      <h2>Top Categories</h2>
      <canvas id="chart-categories" width="300" height="300"></canvas>
    </div>

    <div style="background:#222; padding:20px; border-radius:12px; min-width:300px;">
      <h2>Top Searches</h2>
      <canvas id="chart-searches" width="300" height="300"></canvas>
    </div>
  </div>
</div>

<!-- Include Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <div class="footer">
    Discord: @NewGen_Dev<br>
    Roblox: @NewGen_Dev<br>
    E-Mail: 48hGen@gmail.com
  </div>

  <script src="script.js"></script>
</body>
</html>
